package = "minijinja-lua"
version = "0.3.5"
lua = ">=5.1"

[description]
summary = "a minijinja lua module using the minijinja rust crate"
maintainer = "benniekiss"
homepage = "https://github.com/benniekiss/rs-mod-lua"
issues_url = "https://github.com/benniekiss/rs-mod-lua/issues"
labels = ["jinja", "minijinja", "template", "rust", "bindings"]
license = "MIT"

[source]
url = "https://github.com/benniekiss/rs-mod-lua/archive/refs/tags/$(PACKAGE)-v$(VERSION).zip"
dev = "git+https://github.com/benniekiss/rs-mod-lua"
dir = "rs-mod-lua-$(PACKAGE)-v$(VERSION)/crates/$(PACKAGE)"

[build]
type = "rust-mlua"
default_features = false
features = ["module", "contrib"]

[build.modules]
"minijinja" = "minijinja_lua"

[build.include]
"library/minijinja.d.lua" = "minijinja.d.lua"

[test]
type = "busted"
