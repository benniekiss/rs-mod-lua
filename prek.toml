[[repos.hooks]]
id = "lx-lint"
name = "lx lint"
entry = "lx --no-luarc --lua-version 5.4 lint -g -q -u --no-max-line-length"
language = "system"
pass_filenames = true
files = { glob = ["*.lua"] }
exclude = { glob = [".lux/**"] }

[[repos.hooks]]
id = "lx-fmt"
name = "lx fmt"
entry = "lx --no-luarc --lua-version 5.4 fmt --backend luafmt --path"
language = "system"
pass_filenames = 1
files = { glob = ["*.lua"] }
exclude = { glob = [".lux/**", "**/minijinja.d.lua"] }

[[repos.hooks]]
id = "cargo-clippy"
name = "cargo clippy"
entry = "cargo clippy --locked"
language = "system"
pass_filenames = false
files = { glob = ["*.rs"] }

[[repos.hooks]]
id = "cargo-fmt"
name = "cargo fmt"
entry = "cargo fmt --"
language = "system"
pass_filenames = true
files = { glob = ["*.rs"] }
